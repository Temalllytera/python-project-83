<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <title>Page Analyzer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
  </head>

  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">Анализатор страниц</a>
        <a class="nav-link text-white" href="{{ url_for('urls') }}">Сайты</a>
      </div>
    </nav>

    <div class="container mt-4">

      <h1 class="mb-4">Сайты</h1>

      <table class="table table-bordered" data-test="urls">
        <thead>
          <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Последняя проверка</th>
            <th>Код ответа</th>
          </tr>
        </thead>
        <tbody>
          {% for url in urls %}
            <tr>
              <td>{{ url.id }}</td>
              <td>
                <a href="{{ url_for('show_url', id=url.id) }}">
                  {{ url.name }}
                </a>
              </td>
              <td>
                {% if url.last_check %}
                  {{ url.last_check.strftime('%Y-%m-%d') }}
                {% endif %}
              </td>
              <td>{{ url.status_code or '' }}</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>

    </div>
  </body>
</html>
